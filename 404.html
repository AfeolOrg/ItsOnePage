<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >

    <title>404 — ItsOnePage</title>

    <meta
      name="description"
      content="The requested page could not be found."
    >

    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0d1117;
        color: #f0f6fc;
      }

      main {
        width: min(680px, calc(100% - 40px));
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(3rem, 10vw, 6rem);
        line-height: 1;
      }

      h2 {
        margin: 0 0 24px;
        font-size: clamp(1.3rem, 4vw, 2rem);
        font-weight: 500;
        color: #c9d1d9;
      }

      p {
        max-width: 620px;
        margin: 0 0 16px;
        font-size: 1.1rem;
        line-height: 1.7;
        color: #c9d1d9;
      }

      a {
        color: #58a6ff;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>404</h1>

      <h2>This page does not exist.</h2>

      <p>
        The link may be outdated, or the page may have been removed.
      </p>

      <p>
        <a href="/">← Back to homepage</a>
      </p>
    </main>
  </body>
</html>
